name: CI Pipeline

on:
  push:
  pull_request:

jobs:

  bandit_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . \
          -f sarif \
          -o bandit.sarif \
          -lll || true

      - name: Upload Bandit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit.sarif

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

  semgrep_scan:
    name: Run Semgrep Scan
    runs-on: ubuntu-latest

    container:
      image: returntocorp/semgrep:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
          --severity=ERROR \
          --severity=WARNING \
          --sarif \
          --output=semgrep.sarif || true

      - name: Upload Semgrep Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  docker_build:
    name: Build Docker Image
    needs: [bandit_scan, semgrep_scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pygoat .

      - name: Docker Scout Quickview
        run: docker scout quickview pygoat || true
